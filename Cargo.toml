[package]
name = "pdfsink-rs"
version = "0.1.0"
edition = "2021"
description = "Native pure-Rust PDF extraction crate inspired by pdfplumber"
license = "MIT"
repository = "https://github.com/jsvine/pdfplumber"

[lib]
name = "pdfsink_rs"
path = "src/lib.rs"

[[bin]]
name = "pdfsink-rs"
path = "src/bin/pdfsink-rs.rs"

[dependencies]
euclid = "0.20.5"
lopdf = "0.38"
ordered-float = "4"
pdf-extract = "0.10"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"

[[example]]
name = "bench_pdfsink"
path = "bench/bench_pdfsink.rs"

[dev-dependencies]
serde_json = "1"
